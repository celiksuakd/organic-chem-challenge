<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PETROCHEM CHALLENGE — Industrial Organic Chemistry</title>
<style>
  :root {
    --bg: #07090f;
    --bg2: #0e1320;
    --card: #131a2c;
    --card2: #1a2340;
    --text: #e6f1ff;
    --muted: #6b7a99;
    --accent: #00ff9f;
    --accent2: #00d9ff;
    --danger: #ff3860;
    --warn: #ffb800;
    --locked: #2a3147;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body {
    background: var(--bg);
    color: var(--text);
    font-family: ui-monospace, "SF Mono", "JetBrains Mono", Menlo, Consolas, monospace;
    min-height: 100vh;
    overflow-x: hidden;
  }
  body::before {
    content: "";
    position: fixed; inset: 0; pointer-events: none;
    background: repeating-linear-gradient(
      0deg,
      rgba(0,255,159,0.02) 0px,
      rgba(0,255,159,0.02) 1px,
      transparent 1px,
      transparent 3px
    );
    z-index: 9999;
  }
  body::after {
    content: "";
    position: fixed; inset: 0; pointer-events: none;
    background: radial-gradient(ellipse at center, transparent 50%, rgba(0,0,0,0.5) 100%);
    z-index: 9998;
  }
  #app {
    max-width: 1100px;
    margin: 0 auto;
    padding: 24px;
    min-height: 100vh;
    position: relative;
    z-index: 1;
  }

  /* HUD */
  .hud {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 12px 18px;
    background: var(--card);
    border: 1px solid var(--accent);
    box-shadow: 0 0 20px rgba(0,255,159,0.15);
    margin-bottom: 20px;
    border-radius: 6px;
  }
  .hud-item { display: flex; gap: 8px; align-items: center; font-size: 14px; }
  .hud-label { color: var(--muted); text-transform: uppercase; letter-spacing: 1px; font-size: 11px; }
  .hud-value { color: var(--accent); font-weight: bold; font-size: 18px; }
  .lives { display: flex; gap: 4px; }
  .life { width: 18px; height: 18px; color: var(--danger); font-size: 18px; line-height: 1; }
  .life.lost { color: var(--locked); }
  .streak.hot .hud-value { color: var(--warn); text-shadow: 0 0 10px var(--warn); }
  .streak.fire .hud-value { color: var(--danger); text-shadow: 0 0 14px var(--danger); animation: pulse 0.6s infinite; }

  @keyframes pulse {
    0%, 100% { transform: scale(1); }
    50% { transform: scale(1.1); }
  }
  @keyframes flicker {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.4; }
  }
  @keyframes glitch {
    0% { transform: translate(0); }
    20% { transform: translate(-3px, 2px); }
    40% { transform: translate(3px, -2px); }
    60% { transform: translate(-2px, -2px); }
    80% { transform: translate(2px, 2px); }
    100% { transform: translate(0); }
  }

  /* TITLE SCREEN */
  .title-screen { text-align: center; padding-top: 80px; }
  .title {
    font-size: 64px;
    letter-spacing: 4px;
    color: var(--accent);
    text-shadow: 0 0 24px var(--accent), 0 0 60px rgba(0,255,159,0.3);
    margin-bottom: 12px;
  }
  .subtitle {
    color: var(--accent2);
    letter-spacing: 6px;
    margin-bottom: 8px;
    font-size: 14px;
  }
  .tagline {
    color: var(--muted);
    margin-bottom: 60px;
    font-size: 15px;
  }
  .boot-log {
    text-align: left;
    max-width: 500px;
    margin: 30px auto;
    background: var(--bg2);
    border: 1px solid var(--locked);
    padding: 16px;
    font-size: 12px;
    color: var(--muted);
    min-height: 140px;
  }
  .boot-log .line { margin: 2px 0; }
  .boot-log .ok { color: var(--accent); }
  .boot-log .warn { color: var(--warn); }

  .btn {
    background: transparent;
    border: 2px solid var(--accent);
    color: var(--accent);
    padding: 14px 32px;
    font-family: inherit;
    font-size: 16px;
    letter-spacing: 2px;
    cursor: pointer;
    text-transform: uppercase;
    transition: all 0.2s;
    margin: 6px;
  }
  .btn:hover {
    background: var(--accent);
    color: var(--bg);
    box-shadow: 0 0 24px var(--accent);
  }
  .btn.secondary { border-color: var(--muted); color: var(--muted); }
  .btn.secondary:hover { background: var(--muted); color: var(--bg); box-shadow: none; }
  .btn.danger { border-color: var(--danger); color: var(--danger); }
  .btn.danger:hover { background: var(--danger); color: var(--bg); box-shadow: 0 0 24px var(--danger); }
  .btn:disabled { opacity: 0.3; cursor: not-allowed; }

  /* MAP */
  .map-header { text-align: center; margin-bottom: 24px; }
  .map-title { font-size: 28px; color: var(--accent); letter-spacing: 3px; }
  .map-sub { color: var(--muted); font-size: 13px; margin-top: 6px; }
  .room-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
    gap: 14px;
    margin-bottom: 20px;
  }
  .room-card {
    background: var(--card);
    border: 1px solid var(--locked);
    padding: 16px;
    cursor: pointer;
    transition: all 0.2s;
    position: relative;
    min-height: 140px;
    display: flex;
    flex-direction: column;
    justify-content: space-between;
  }
  .room-card.unlocked {
    border-color: var(--accent2);
    box-shadow: 0 0 12px rgba(0,217,255,0.2);
  }
  .room-card.unlocked:hover {
    transform: translateY(-3px);
    border-color: var(--accent);
    box-shadow: 0 0 24px rgba(0,255,159,0.4);
  }
  .room-card.completed {
    border-color: var(--accent);
    background: linear-gradient(135deg, var(--card) 0%, rgba(0,255,159,0.06) 100%);
  }
  .room-card.locked { opacity: 0.4; cursor: not-allowed; }
  .room-card.boss {
    grid-column: span 2;
    background: linear-gradient(135deg, var(--card2) 0%, rgba(255,56,96,0.08) 100%);
    border-color: var(--danger);
  }
  .room-card.boss.locked { border-color: var(--locked); }
  .room-id {
    font-size: 11px;
    color: var(--muted);
    letter-spacing: 2px;
    margin-bottom: 4px;
  }
  .room-name { font-size: 14px; font-weight: 600; line-height: 1.4; color: var(--text); }
  .room-date { font-size: 11px; color: var(--muted); margin-top: 4px; }
  .room-footer { display: flex; justify-content: space-between; align-items: center; margin-top: 12px; }
  .stars { color: var(--warn); letter-spacing: 2px; font-size: 14px; }
  .mastery { font-size: 11px; color: var(--accent); }
  .lock-icon { color: var(--muted); }

  /* ROOM (in-game) */
  .question-screen { padding: 0; }
  .question-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 20px;
    padding-bottom: 14px;
    border-bottom: 1px solid var(--locked);
  }
  .breadcrumb { color: var(--muted); font-size: 12px; letter-spacing: 2px; }
  .breadcrumb .accent { color: var(--accent); }
  .q-progress { color: var(--accent2); font-size: 13px; }

  .question-card {
    background: var(--card);
    border: 1px solid var(--accent2);
    padding: 28px;
    margin-bottom: 20px;
    box-shadow: 0 0 30px rgba(0,217,255,0.1);
  }
  .q-type-badge {
    display: inline-block;
    background: var(--bg2);
    color: var(--accent2);
    padding: 4px 10px;
    font-size: 10px;
    letter-spacing: 2px;
    margin-bottom: 16px;
    border: 1px solid var(--accent2);
  }
  .q-prompt {
    font-family: ui-sans-serif, system-ui, sans-serif;
    font-size: 18px;
    line-height: 1.6;
    margin-bottom: 24px;
    color: var(--text);
  }
  .q-prompt code, .q-prompt .eq {
    font-family: ui-monospace, monospace;
    background: var(--bg2);
    padding: 1px 6px;
    color: var(--accent);
    border-radius: 3px;
  }

  /* MCQ options */
  .options { display: flex; flex-direction: column; gap: 10px; }
  .option {
    background: var(--bg2);
    border: 1px solid var(--locked);
    padding: 14px 18px;
    cursor: pointer;
    transition: all 0.15s;
    font-family: ui-sans-serif, system-ui, sans-serif;
    font-size: 15px;
    color: var(--text);
    text-align: left;
    display: flex;
    align-items: center;
    gap: 12px;
  }
  .option:hover { border-color: var(--accent2); background: var(--card2); }
  .option.selected { border-color: var(--accent); background: rgba(0,255,159,0.08); }
  .option.correct { border-color: var(--accent); background: rgba(0,255,159,0.18); box-shadow: 0 0 16px rgba(0,255,159,0.3); }
  .option.wrong { border-color: var(--danger); background: rgba(255,56,96,0.15); animation: glitch 0.3s; }
  .option-letter {
    display: inline-block;
    width: 28px; height: 28px;
    border: 1px solid var(--muted);
    text-align: center;
    line-height: 26px;
    font-weight: bold;
    color: var(--muted);
    flex-shrink: 0;
  }
  .option.selected .option-letter, .option.correct .option-letter { border-color: var(--accent); color: var(--accent); }
  .option.wrong .option-letter { border-color: var(--danger); color: var(--danger); }

  /* Numeric input */
  .numeric-wrap { display: flex; gap: 12px; align-items: center; }
  .numeric-input {
    background: var(--bg2);
    border: 1px solid var(--accent2);
    color: var(--accent);
    padding: 14px 18px;
    font-family: inherit;
    font-size: 24px;
    width: 200px;
    text-align: center;
    letter-spacing: 1px;
  }
  .numeric-input:focus { outline: none; border-color: var(--accent); box-shadow: 0 0 12px var(--accent); }
  .numeric-units { color: var(--muted); font-size: 14px; }

  /* Match */
  .match-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
  }
  .match-col-label {
    color: var(--accent2);
    font-size: 11px;
    letter-spacing: 2px;
    margin-bottom: 6px;
  }
  .match-item {
    background: var(--bg2);
    border: 1px solid var(--locked);
    padding: 12px;
    cursor: pointer;
    margin-bottom: 8px;
    transition: all 0.15s;
    font-family: ui-sans-serif, system-ui, sans-serif;
    font-size: 14px;
  }
  .match-item:hover { border-color: var(--accent2); }
  .match-item.selected { border-color: var(--accent); background: rgba(0,255,159,0.1); }
  .match-item.paired { opacity: 0.5; cursor: default; border-color: var(--accent); background: rgba(0,255,159,0.05); }
  .match-pair-tag { display: inline-block; color: var(--accent); margin-right: 6px; font-weight: bold; }

  /* Feedback */
  .feedback {
    margin-top: 20px;
    padding: 16px;
    border-left: 3px solid;
    background: var(--bg2);
    font-family: ui-sans-serif, system-ui, sans-serif;
    font-size: 14px;
    line-height: 1.6;
  }
  .feedback.correct { border-color: var(--accent); }
  .feedback.wrong { border-color: var(--danger); }
  .feedback-title { font-weight: bold; margin-bottom: 6px; font-family: inherit; letter-spacing: 2px; }
  .feedback.correct .feedback-title { color: var(--accent); }
  .feedback.wrong .feedback-title { color: var(--danger); }
  .feedback-explain { color: var(--muted); }

  .q-actions { margin-top: 20px; display: flex; justify-content: flex-end; gap: 10px; }

  /* Results */
  .result-screen { text-align: center; padding: 40px 0; }
  .result-headline { font-size: 32px; color: var(--accent); letter-spacing: 4px; margin-bottom: 12px; }
  .result-headline.fail { color: var(--danger); }
  .result-room { color: var(--muted); margin-bottom: 32px; }
  .result-stats {
    display: flex;
    justify-content: center;
    gap: 40px;
    margin-bottom: 40px;
  }
  .result-stat { }
  .result-stat-value { font-size: 36px; color: var(--accent); font-weight: bold; }
  .result-stat-label { font-size: 11px; color: var(--muted); letter-spacing: 2px; margin-top: 4px; }
  .result-stars { font-size: 48px; color: var(--warn); letter-spacing: 8px; margin: 20px 0; }

  /* Boss screen accent */
  .boss-mode .question-card { border-color: var(--danger); box-shadow: 0 0 24px rgba(255,56,96,0.2); }
  .boss-mode .q-type-badge { border-color: var(--danger); color: var(--danger); }
  .boss-timer { color: var(--danger); font-size: 24px; font-weight: bold; letter-spacing: 2px; }
  .boss-timer.critical { animation: flicker 0.4s infinite; }

  /* Misc */
  .center { text-align: center; }
  .mt-lg { margin-top: 32px; }
  .ascii { font-family: monospace; white-space: pre; line-height: 1.1; color: var(--accent); opacity: 0.5; font-size: 11px; }
</style>
</head>
<body>
<div id="app"></div>

<script>
// ============================================================
// QUESTION BANK — DCoCP (Dynamics and Control of Chemical Processes)
// Course: Prof. Matteo Pelucchi, Politecnico di Milano, AY 2025/26
// Based on Stephanopoulos "Chemical Process Control" + course calendar
// ============================================================

const ROOMS = [
  {
    id: 'L1', date: 'WK1', name: 'Products & Productions', questions: [
      { type: 'mcq', prompt: 'In the chemical industry classification, BASE CHEMICALS (commodities) are characterized by:',
        options: ['Short life cycle, controlled by market demand', 'Long life cycle, first step in producing many other chemicals; focus is on process development', 'Highly specialized, customer-tailored formulations', 'Small volumes, high margins, fast iteration'],
        correct: 1, explain: 'Commodities = methanol, ethylene, ammonia, etc. Sold by the kt, decade-stable demand. R&D focus is on shaving cents/kg via process improvement, not on new molecules.' },
      { type: 'mcq', prompt: 'Which classification is BEST for a custom pigment used in a specific batch of automotive paint?',
        options: ['Base chemical (commodity)', 'Specialty chemical', 'Fine chemical', 'Pseudocommodity'],
        correct: 1, explain: 'Specialties: short life cycle, market-driven, customer-specific. Fine chemicals = pharma intermediates, also low volume but more lab-driven.' },
      { type: 'match', prompt: 'Match each product category to its typical example.',
        pairs: [
          { left: 'Base chemical (commodity)', right: 'Methanol, ethylene, ammonia' },
          { left: 'Specialty chemical', right: 'Custom dye for a paint batch' },
          { left: 'Pseudocommodity', right: 'Polyethylene, polyester fibers' },
          { left: 'Fine chemical', right: 'Pharmaceutical intermediate' }
        ], explain: 'Volume vs value vs lifecycle defines the category. Commodity = high-vol/low-margin/stable; fine = low-vol/high-margin/short-lived.' },
      { type: 'mcq', prompt: 'A BIOREFINERY is distinguished from a petrochemical refinery by:',
        options: ['Use of biomass feedstocks (palm oil, used cooking oil, lignocellulosic, etc.) rather than crude oil', 'Producing only fuels', 'Operating at lower temperatures', 'Using only biological catalysts'],
        correct: 0, explain: 'Biorefinery: oils/fats → FAME, HVO; sugars → bioethanol; lignocellulose → 2G biofuels and platform chemicals. Same value-chain logic, different carbon source.' },
      { type: 'error', prompt: 'One of these statements is FALSE.',
        statements: [
          'The Inorganic Chemical Industry covers products from minerals, air, and water (sulfuric acid, ammonia, nitric acid)',
          'Refinery products include gasoline and diesel fuels',
          'Petrochemical = Organic Chemical Industry, starting from oil/gas/coal',
          'Specialty chemicals are produced in larger volumes than commodities'
        ], wrongIndex: 3, explain: 'Backwards. Commodities = mass tonnage; specialties = small batches, high margin. Volume hierarchy: commodity > pseudocommodity > specialty > fine.' }
    ]
  },
  {
    id: 'L2', date: 'WK2', name: 'Raw Materials', questions: [
      { type: 'mcq', prompt: 'Natural gas described as "wet gas" contains:',
        options: ['Liquid water at the wellhead', 'C2 and C3 paraffins in addition to methane', 'Sulfur compounds requiring sweetening', 'CO2 at >10%'],
        correct: 1, explain: '"Dry" = essentially pure CH4. "Wet" = contains ethane, propane, sometimes butane — heavier hydrocarbons. NGL recovery splits them out for petrochemical use.' },
      { type: 'mcq', prompt: 'The "sweetening" step in natural gas treatment refers to:',
        options: ['Removing water (dehydration)', 'Removing H2S (and CO2) using amines', 'Adding odorant', 'Removing C2+ NGLs'],
        correct: 1, explain: 'Sweetening = sulfur removal. Most common: amine absorption (MDEA, MEA). H2S must be reduced to <0.25 ppm before steam reforming or it will poison downstream catalysts.' },
      { type: 'mcq', prompt: 'SYNGAS is most commonly produced industrially from:',
        options: ['Coal gasification', 'Steam reforming of natural gas', 'Biomass pyrolysis', 'Water electrolysis'],
        correct: 1, explain: 'CH4 + H2O ⇌ CO + 3H2 (endothermic, ~850°C, Ni catalyst). ~75% of world methanol comes via this route. Coal gasification is regionally important (China).' },
      { type: 'match', prompt: 'Match each feedstock to its primary downstream product.',
        pairs: [
          { left: 'Triglycerides (oils, fats)', right: 'FAME / HVO biodiesel' },
          { left: 'Syngas (CO + H2)', right: 'Methanol' },
          { left: 'Naphtha', right: 'Light olefins via steam cracking' },
          { left: 'CO2 + H2', right: 'Power-to-X fuels / methanol' }
        ], explain: 'Feedstock + chemistry → product. Increasingly, CO2 is being treated as a feedstock rather than waste, though reactivity and energy content limit its appeal.' },
      { type: 'mcq', prompt: 'The principal challenges of using CO2 as a chemical feedstock are:',
        options: ['It is too rare in the atmosphere', 'Poor reactivity and low energy content (need H2 + energy input)', 'It is too expensive to purify', 'It freezes at room temperature'],
        correct: 1, explain: 'CO2 is the lowest-energy carbon form. Any useful product requires reduction → needs H2 (ideally from renewable electrolysis) and energy input. The economics are the bottleneck.' }
    ]
  },
  {
    id: 'L3', date: 'WK3', name: 'Process Schemes & Yield', questions: [
      { type: 'mcq', prompt: 'In a chemical process: CONVERSION = ?',
        options: ['(moles product formed)/(moles reactant fed)', '(moles reactant consumed)/(moles reactant fed)', '(moles product formed)/(moles reactant consumed)', '(moles desired product)/(moles total products)'],
        correct: 1, explain: 'Conversion X = consumed/fed. SELECTIVITY = product/consumed. YIELD = product/fed = X × S. Get these three confused and the whole exercise unravels.' },
      { type: 'mcq', prompt: 'SELECTIVITY toward the desired product is defined as:',
        options: ['(moles desired product) / (moles reactant fed)', '(moles desired product) / (moles reactant consumed)', '(moles reactant consumed) / (moles fed)', '(moles total products) / (moles reactant fed)'],
        correct: 1, explain: 'Selectivity tells you "of what reacted, how much went the way I wanted." Often the single most important number in industrial process design.' },
      { type: 'numeric', prompt: 'A reactor: feed 100 mol A; 80 mol A consumed; 60 mol of desired product P formed. Compute the yield (P/fed) as a percentage.',
        answer: 60, tolerance: 0.5, units: '%',
        explain: 'Yield = (moles P formed)/(moles A fed) = 60/100 = 60%. Note: X = 80%, S = 60/80 = 75%. Yield = X·S = 0.80·0.75 = 0.60.' },
      { type: 'mcq', prompt: 'Why use RECYCLE streams in a chemical process?',
        options: ['To reduce capital cost only', 'To increase overall yield when single-pass conversion is low and the reactant is valuable', 'To dispose of unwanted products', 'They have no thermodynamic justification'],
        correct: 1, explain: 'Single-pass conversion is often <50% (kinetics, equilibrium, selectivity). Recycle the unreacted reactant → overall conversion → near-100%. Tradeoff: bigger separation duty and purge to bleed inerts.' },
      { type: 'match', prompt: 'Match each diagram type to its level of detail.',
        pairs: [
          { left: 'Block Flow Diagram', right: 'Major process steps as labeled blocks' },
          { left: 'Process Flow Diagram (PFD)', right: 'Equipment with main streams, T, P, flows' },
          { left: 'P&ID', right: 'Every line, valve, instrument, tag' },
          { left: 'Material Balance Sheet', right: 'Stream-by-stream component flows' }
        ], explain: 'Detail escalates: BFD → PFD → P&ID. The PFD is where the engineering judgment lives; the P&ID is the construction document.' }
    ]
  },
  {
    id: 'L4', date: 'WK4', name: 'Catalysis & Catalysts', questions: [
      { type: 'mcq', prompt: 'A CATALYST is a substance that:',
        options: ['Shifts the chemical equilibrium toward products', 'Increases the rate of reaching equilibrium without being permanently consumed', 'Lowers ΔG of reaction', 'Increases the heat of reaction'],
        correct: 1, explain: 'Catalysts open a lower-Ea pathway — kinetics only. They do NOT shift equilibrium (Keq is a state function of T) and they emerge chemically unchanged (in principle).' },
      { type: 'mcq', prompt: 'Compared to HOMOGENEOUS catalysis, HETEROGENEOUS catalysis offers:',
        options: ['Easier catalyst/product separation and operation at higher T', 'Better mass transfer at all conditions', 'Higher selectivity always', 'Smaller reactor volume'],
        correct: 0, explain: 'Het advantages: easy filtration, high-T tolerance, non-corrosive solids. Drawbacks: only surface is active, prone to poisoning, mass-transfer limitations, selectivity often worse than homog.' },
      { type: 'match', prompt: 'Match each catalyst-deactivation mode to its cause.',
        pairs: [
          { left: 'Poisoning', right: 'Strong adsorption of impurity (S, Cl) on active sites' },
          { left: 'Coking (Fouling)', right: 'Carbonaceous deposits blocking pores and sites' },
          { left: 'Sintering', right: 'Crystallite growth → loss of surface area at high T' },
          { left: 'Mechanical degradation', right: 'Attrition or abrasion of catalyst particles' }
        ], explain: 'Four classic deactivation modes (Bartholomew). Coking can often be regenerated (burn it off); sintering is usually irreversible.' },
      { type: 'mcq', prompt: 'ZEOLITES owe their industrial importance largely to:',
        options: ['Catalytic activity in liquid phase only', 'Crystalline microporous structure with size-selective channels and Brønsted acid sites', 'Their low cost', 'Tolerance of all poisons'],
        correct: 1, explain: 'Shape selectivity (reactant, product, transition-state) + tunable acidity + thermal stability = the foundation of FCC, alkylation, isomerization, and modern EB processes.' },
      { type: 'error', prompt: 'One statement is FALSE.',
        statements: [
          'Coking is more easily regenerated than sintering',
          'Sintering is essentially irreversible at industrial scale',
          'Catalyst poisons (S, Cl) bind irreversibly to active sites in many systems',
          'A catalyst shifts the equilibrium constant Keq toward the products'
        ], wrongIndex: 3, explain: 'Equilibrium is governed by ΔG°, which depends ONLY on T and pressure (for gases). Catalysts cannot violate thermodynamics — they only speed up the approach.' }
    ]
  },
  {
    id: 'L5', date: 'WK5', name: 'Methanol Synthesis', questions: [
      { type: 'mcq', prompt: 'The main methanol synthesis reaction CO + 2H2 ⇌ CH3OH is:',
        options: ['Endothermic and proceeds with mole increase', 'Exothermic (ΔH° ≈ −90.8 kJ/mol) and proceeds with mole decrease', 'Thermoneutral', 'Slightly endothermic, mole-neutral'],
        correct: 1, explain: 'Strongly exothermic, 3 moles → 1 mole. Le Châtelier: favored by low T and high P. The whole reactor design (multistage adiabatic, multitubular) is built around that constraint.' },

  };
}

function loadState() {
  try {
    const raw = localStorage.getItem(SAVE_KEY);
    if (!raw) return defaultState();
    const saved = JSON.parse(raw);
    return { ...defaultState(), ...saved, screen: 'title' };  // always return to title on reload
  } catch (e) {
    return defaultState();
  }
}

function save() {
  try {
    const persist = {
      lives: state.lives, score: state.score, bestStreak: state.bestStreak,
      totalXp: state.totalXp, progress: state.progress,
      bossUnlocked: state.bossUnlocked, bossDone: state.bossDone,
    };
    localStorage.setItem(SAVE_KEY, JSON.stringify(persist));
  } catch (e) {}
}

function resetAll() {
  if (!confirm('Wipe all progress and start over? This cannot be undone.')) return;
  localStorage.removeItem(SAVE_KEY);
  state = defaultState();
  render();
}

// ============================================================
// AUDIO (Web Audio API beeps)
// ============================================================
let audioCtx = null;
function beep(freq, dur, type = 'square', vol = 0.04) {
  try {
    if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    const o = audioCtx.createOscillator();
    const g = audioCtx.createGain();
    o.type = type;
    o.frequency.value = freq;
    g.gain.value = vol;
    o.connect(g); g.connect(audioCtx.destination);
    o.start();
    g.gain.exponentialRampToValueAtTime(0.0001, audioCtx.currentTime + dur);
    o.stop(audioCtx.currentTime + dur);
  } catch (e) {}
}
const sfx = {
  click: () => beep(800, 0.05),
  correct: () => { beep(660, 0.1); setTimeout(() => beep(990, 0.15), 80); },
  wrong: () => { beep(180, 0.2, 'sawtooth', 0.06); },
  unlock: () => { beep(440, 0.08); setTimeout(() => beep(660, 0.08), 70); setTimeout(() => beep(880, 0.15), 140); },
  boss: () => { beep(110, 0.4, 'sawtooth', 0.08); }
};

function renderQuestionBody(q) {
  const locked = state.answered ? 'style="pointer-events: none;"' : '';
  if (q.type === 'mcq' || q.type === 'error') {
    const options = q.type === 'mcq' ? q.options : q.statements;
    return `<div class="options" ${locked}>` + options.map((opt, i) => {
      let cls = '';
      if (state.currentAnswer === i) cls = 'selected';
      if (state.answered) {
        const correctIdx = q.type === 'mcq' ? q.correct : q.wrongIndex;
        if (i === correctIdx) cls = 'correct';
        else if (i === state.currentAnswer) cls = 'wrong';
      }
      const letter = String.fromCharCode(65 + i);
      return `<div class="option ${cls}" onclick="pickOption(${i})"><span class="option-letter">${letter}</span><span>${opt}</span></div>`;
    }).join('') + '</div>';
  }
  if (q.type === 'numeric') {
    return `
      <div class="numeric-wrap">
        <input type="number" class="numeric-input" id="numInput" step="any"
               value="${state.currentAnswer ?? ''}"
               oninput="state.currentAnswer = this.value === '' ? null : parseFloat(this.value); document.getElementById('submitBtn').disabled = state.currentAnswer === null;"
               onkeydown="if(event.key==='Enter' && !state.answered && state.currentAnswer !== null) submitAnswer();"
               ${state.answered ? 'disabled' : 'autofocus'}>
        <span class="numeric-units">${q.units || ''}</span>
      </div>
    `;
  }
  if (q.type === 'match') {
    // currentAnswer holds: { pairs: { leftIdx: rightIdx }, picking: leftIdx | null }
    if (!state.currentAnswer || typeof state.currentAnswer !== 'object') {
      state.currentAnswer = { pairs: {}, picking: null };
    }
    const ans = state.currentAnswer;
    const rightShuffled = q._shuffledRight || (q._shuffledRight = shuffle(q.pairs.map((p, i) => ({ text: p.right, originalIdx: i }))));
    let html = '<div class="match-grid">';
    // Left column
    html += '<div><div class="match-col-label">TERMS</div>';
    q.pairs.forEach((p, i) => {
      const paired = ans.pairs[i] !== undefined;
      const selected = ans.picking === i;
      const pairTag = paired ? `<span class="match-pair-tag">[${getPairLetter(ans.pairs[i], rightShuffled)}]</span>` : '';
      let revealCls = '';
      if (state.answered) {
        revealCls = ans.pairs[i] === i ? 'correct' : 'wrong';
        revealCls = revealCls === 'correct' ? 'paired' : 'wrong';
      }
      html += `<div class="match-item ${paired ? 'paired' : ''} ${selected ? 'selected' : ''} ${state.answered ? revealCls : ''}"
                onclick="pickMatchLeft(${i})">${pairTag}${p.left}</div>`;
    });
    html += '</div>';
    // Right column (shuffled)
    html += '<div><div class="match-col-label">DEFINITIONS</div>';
    rightShuffled.forEach((r, displayIdx) => {
      const usedBy = Object.entries(ans.pairs).find(([l, rOrig]) => rOrig === r.originalIdx);
      const paired = !!usedBy;
      const letter = String.fromCharCode(65 + displayIdx);
      html += `<div class="match-item ${paired ? 'paired' : ''}" onclick="pickMatchRight(${r.originalIdx})">
                 <span class="match-pair-tag">[${letter}]</span>${r.text}
               </div>`;
    });
    html += '</div></div>';
    return html;
  }
  return '<div>Unsupported question type.</div>';
}

function getPairLetter(originalRightIdx, shuffledRight) {
  const idx = shuffledRight.findIndex(r => r.originalIdx === originalRightIdx);
  return String.fromCharCode(65 + idx);
}

function renderFeedback(q) {

// ============================================================
// EVENT HANDLERS
// ============================================================
function goMap() {
  sfx.click();
  state.screen = 'map';
  state.currentRoomId = null;
  state.currentQIdx = 0;
  state.currentAnswer = null;
  state.answered = false;
  state.roomResults = [];
  state.lives = 3;  // refill lives between rooms
  render();
}

function startRoom(id) {
  sfx.click();
  state.screen = 'room';
  state.currentRoomId = id;
  state.currentQIdx = 0;
  state.currentAnswer = null;
  state.answered = false;
  state.roomResults = [];
  state.lives = 3;
  state.streak = 0;
  // shuffle each room's MCQ option order? No — keep stable for muscle memory.
  // Reset any shuffled match arrays so they re-shuffle on retry:
  ROOMS.find(r => r.id === id).questions.forEach(q => { if (q.type === 'match') delete q._shuffledRight; });
  render();
}

function pickOption(i) {
  if (state.answered) return;
  sfx.click();
  state.currentAnswer = i;
  render();
}

function pickMatchLeft(leftIdx) {
  if (state.answered) return;
  const ans = state.currentAnswer;
  if (ans.pairs[leftIdx] !== undefined) {
    // already paired — unpair
    delete ans.pairs[leftIdx];
    ans.picking = null;
  } else {
    ans.picking = leftIdx;
  }
  sfx.click();
  render();
  maybeFinalizeMatch();
}

function pickMatchRight(rightIdx) {
  if (state.answered) return;
  const ans = state.currentAnswer;
  // if this right is already paired, do nothing
  if (Object.values(ans.pairs).includes(rightIdx)) return;
  if (ans.picking === null) return;
  ans.pairs[ans.picking] = rightIdx;
  ans.picking = null;
  sfx.click();
  render();
  maybeFinalizeMatch();
}

function maybeFinalizeMatch() {
  const q = ROOMS.find(r => r.id === state.currentRoomId)?.questions[state.currentQIdx]
            || BOSS_POOL?.[state.currentQIdx];
  if (!q || q.type !== 'match') return;
  const ans = state.currentAnswer;
  const pairCount = Object.keys(ans.pairs).length;
  document.getElementById('submitBtn').disabled = pairCount !== q.pairs.length;
}

function submitAnswer() {
  const room = state.bossActive
    ? { questions: BOSS_POOL, id: 'BOSS' }
    : ROOMS.find(r => r.id === state.currentRoomId);
  const q = room.questions[state.currentQIdx];
  let correct = false;
  if (q.type === 'mcq') correct = state.currentAnswer === q.correct;
  else if (q.type === 'error') correct = state.currentAnswer === q.wrongIndex;
  else if (q.type === 'numeric') {
    const ans = parseFloat(state.currentAnswer);
    correct = !isNaN(ans) && Math.abs(ans - q.answer) <= (q.tolerance ?? 0.01);
  } else if (q.type === 'match') {
    correct = q.pairs.every((_, i) => state.currentAnswer.pairs[i] === i);
  }

  state.answered = true;
  state.lastCorrect = correct;
  state.roomResults.push(correct);

  if (correct) {
    state.streak++;
    if (state.streak > state.bestStreak) state.bestStreak = state.streak;
    const mult = Math.min(5, 1 + Math.floor(state.streak / 3));
    const gain = (state.bossActive ? 100 : 50) * mult;
    state.totalXp += gain;
    sfx.correct();
  } else {
    state.streak = 0;
    state.lives--;
    sfx.wrong();
  }
  save();
  render();

  // If out of lives mid-room, end the room
  if (state.lives <= 0 && !state.bossActive) {
    setTimeout(() => endRoom(), 1400);
  } else if (state.lives <= 0 && state.bossActive) {
    setTimeout(() => endBoss(), 1400);
  }
}

function nextQuestion() {
  const room = state.bossActive ? { questions: BOSS_POOL } : ROOMS.find(r => r.id === state.currentRoomId);
  state.currentQIdx++;
  state.currentAnswer = null;
  state.answered = false;
  if (state.currentQIdx >= room.questions.length) {
    if (state.bossActive) endBoss();
    else endRoom();
    return;
  }
  // Reset match answer if next is match
  const nextQ = room.questions[state.currentQIdx];
  if (nextQ.type === 'match') state.currentAnswer = { pairs: {}, picking: null };
  render();
}

function endRoom() {
  state.screen = 'result';
  render();
}

function abandonRoom() {
  if (!confirm('Leave this room? Progress within the room is lost.')) return;
  goMap();
}

// ============================================================
// BOSS
// ============================================================
let BOSS_POOL = [];
function startBoss() {
  sfx.click();
  state.screen = 'boss-intro';
  render();
}

function actuallyStartBoss() {
  sfx.boss();
  // Build pool: 10 random from rooms + 5 exclusive
  const allRoomQs = ROOMS.flatMap(r => r.questions);
  BOSS_POOL = [...shuffle(allRoomQs).slice(0, 10), ...BOSS_EXCLUSIVE].sort(() => Math.random() - 0.5);
  // Clear any prior match shuffles
  BOSS_POOL.forEach(q => { if (q.type === 'match') delete q._shuffledRight; });
  state.bossActive = true;
  state.screen = 'room';
  state.currentRoomId = '★ BOSS ROUND ★';
  state.currentQIdx = 0;
  state.currentAnswer = BOSS_POOL[0].type === 'match' ? { pairs: {}, picking: null } : null;
  state.answered = false;
  state.roomResults = [];
  state.lives = 3;
  state.streak = 0;
  // Patch the room lookup: render uses currentRoomId, so we wrap
  render();
}

function endBoss() {
  state.bossActive = false;
  state.screen = 'boss-result';
  render();
}

// Patch render() for boss: when bossActive, treat currentRoom as BOSS_POOL
const originalRenderRoom = renderRoom;
renderRoom = function() {
  if (!state.bossActive) return originalRenderRoom();
  const q = BOSS_POOL[state.currentQIdx];
  if (!q) { state.screen = 'boss-result'; render(); return; }
  let html = renderHUD();
  html += `
    <div class="question-header">
      <div class="breadcrumb">// <span class="accent" style="color: var(--danger);">★ BOSS ROUND</span> · EXAM SIMULATION</div>
      <div class="q-progress">Q ${state.currentQIdx + 1} / ${BOSS_POOL.length}</div>
    </div>
    <div class="question-card boss-mode">
      <div class="q-type-badge" style="border-color: var(--danger); color: var(--danger);">${q.type.toUpperCase()}</div>
      <div class="q-prompt">${q.prompt}</div>
      ${renderQuestionBody(q)}
      ${state.answered ? renderFeedback(q) : ''}
      <div class="q-actions">
        ${state.answered
          ? `<button class="btn danger" onclick="nextQuestion()">${state.currentQIdx + 1 >= BOSS_POOL.length ? 'FINALIZE' : 'NEXT →'}</button>`
          : `<button class="btn danger" id="submitBtn" onclick="submitAnswer()" ${state.currentAnswer === null || (typeof state.currentAnswer === 'object' && Object.keys(state.currentAnswer.pairs || {}).length !== (q.pairs?.length || 0)) ? 'disabled' : ''}>SUBMIT</button>`}
        <button class="btn secondary" onclick="abandonBoss()">ABANDON</button>
      </div>
    </div>
  `;
  app.innerHTML = html;
};

function abandonBoss() {
  if (!confirm('Abandon the boss round? You will need to clear all rooms again to retry.')) return;
  state.bossActive = false;
  goMap();
}

// ============================================================
// UTIL
// ============================================================
function shuffle(arr) {
  const a = arr.slice();
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
