<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PETROCHEM CHALLENGE — Industrial Organic Chemistry</title>
<style>
  :root {
    --bg: #07090f;
    --bg2: #0e1320;
    --card: #131a2c;
    --card2: #1a2340;
    --text: #e6f1ff;
    --muted: #6b7a99;
    --accent: #00ff9f;
    --accent2: #00d9ff;
    --danger: #ff3860;
    --warn: #ffb800;
    --locked: #2a3147;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body {
    background: var(--bg);
    color: var(--text);
    font-family: ui-monospace, "SF Mono", "JetBrains Mono", Menlo, Consolas, monospace;
    min-height: 100vh;
    overflow-x: hidden;
  }
  body::before {
    content: "";
    position: fixed; inset: 0; pointer-events: none;
    background: repeating-linear-gradient(
      0deg,
      rgba(0,255,159,0.02) 0px,
      rgba(0,255,159,0.02) 1px,
      transparent 1px,
      transparent 3px
    );
    z-index: 9999;
  }
  body::after {
    content: "";
    position: fixed; inset: 0; pointer-events: none;
    background: radial-gradient(ellipse at center, transparent 50%, rgba(0,0,0,0.5) 100%);
    z-index: 9998;
  }
  #app {
    max-width: 1100px;
    margin: 0 auto;
    padding: 24px;
    min-height: 100vh;
    position: relative;
    z-index: 1;
  }

  /* HUD */
  .hud {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 12px 18px;
    background: var(--card);
    border: 1px solid var(--accent);
    box-shadow: 0 0 20px rgba(0,255,159,0.15);
    margin-bottom: 20px;
    border-radius: 6px;
  }
  .hud-item { display: flex; gap: 8px; align-items: center; font-size: 14px; }
  .hud-label { color: var(--muted); text-transform: uppercase; letter-spacing: 1px; font-size: 11px; }
  .hud-value { color: var(--accent); font-weight: bold; font-size: 18px; }
  .lives { display: flex; gap: 4px; }
  .life { width: 18px; height: 18px; color: var(--danger); font-size: 18px; line-height: 1; }
  .life.lost { color: var(--locked); }
  .streak.hot .hud-value { color: var(--warn); text-shadow: 0 0 10px var(--warn); }
  .streak.fire .hud-value { color: var(--danger); text-shadow: 0 0 14px var(--danger); animation: pulse 0.6s infinite; }

  @keyframes pulse {
    0%, 100% { transform: scale(1); }
    50% { transform: scale(1.1); }
  }
  @keyframes flicker {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.4; }
  }
  @keyframes glitch {
    0% { transform: translate(0); }
    20% { transform: translate(-3px, 2px); }
    40% { transform: translate(3px, -2px); }
    60% { transform: translate(-2px, -2px); }
    80% { transform: translate(2px, 2px); }
    100% { transform: translate(0); }
  }

  /* TITLE SCREEN */
  .title-screen { text-align: center; padding-top: 80px; }
  .title {
    font-size: 64px;
    letter-spacing: 4px;
    color: var(--accent);
    text-shadow: 0 0 24px var(--accent), 0 0 60px rgba(0,255,159,0.3);
    margin-bottom: 12px;
  }
  .subtitle {
    color: var(--accent2);
    letter-spacing: 6px;
    margin-bottom: 8px;
    font-size: 14px;
  }
  .tagline {
    color: var(--muted);
    margin-bottom: 60px;
    font-size: 15px;
  }
  .boot-log {
    text-align: left;
    max-width: 500px;
    margin: 30px auto;
    background: var(--bg2);
    border: 1px solid var(--locked);
    padding: 16px;
    font-size: 12px;
    color: var(--muted);
    min-height: 140px;
  }
  .boot-log .line { margin: 2px 0; }
  .boot-log .ok { color: var(--accent); }
  .boot-log .warn { color: var(--warn); }

  .btn {
    background: transparent;
    border: 2px solid var(--accent);
    color: var(--accent);
    padding: 14px 32px;
    font-family: inherit;
    font-size: 16px;
    letter-spacing: 2px;
    cursor: pointer;
    text-transform: uppercase;
    transition: all 0.2s;
    margin: 6px;
  }
  .btn:hover {
    background: var(--accent);
    color: var(--bg);
    box-shadow: 0 0 24px var(--accent);
  }
  .btn.secondary { border-color: var(--muted); color: var(--muted); }
  .btn.secondary:hover { background: var(--muted); color: var(--bg); box-shadow: none; }
  .btn.danger { border-color: var(--danger); color: var(--danger); }
  .btn.danger:hover { background: var(--danger); color: var(--bg); box-shadow: 0 0 24px var(--danger); }
  .btn:disabled { opacity: 0.3; cursor: not-allowed; }

  /* MAP */
  .map-header { text-align: center; margin-bottom: 24px; }
  .map-title { font-size: 28px; color: var(--accent); letter-spacing: 3px; }
  .map-sub { color: var(--muted); font-size: 13px; margin-top: 6px; }
  .room-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
    gap: 14px;
    margin-bottom: 20px;
  }
  .room-card {
    background: var(--card);
    border: 1px solid var(--locked);
    padding: 16px;
    cursor: pointer;
    transition: all 0.2s;
    position: relative;
    min-height: 140px;
    display: flex;
    flex-direction: column;
    justify-content: space-between;
  }
  .room-card.unlocked {
    border-color: var(--accent2);
    box-shadow: 0 0 12px rgba(0,217,255,0.2);
  }
  .room-card.unlocked:hover {
    transform: translateY(-3px);
    border-color: var(--accent);
    box-shadow: 0 0 24px rgba(0,255,159,0.4);
  }
  .room-card.completed {
    border-color: var(--accent);
    background: linear-gradient(135deg, var(--card) 0%, rgba(0,255,159,0.06) 100%);
  }
  .room-card.locked { opacity: 0.4; cursor: not-allowed; }
  .room-card.boss {
    grid-column: span 2;
    background: linear-gradient(135deg, var(--card2) 0%, rgba(255,56,96,0.08) 100%);
    border-color: var(--danger);
  }
  .room-card.boss.locked { border-color: var(--locked); }
  .room-id {
    font-size: 11px;
    color: var(--muted);
    letter-spacing: 2px;
    margin-bottom: 4px;
  }
  .room-name { font-size: 14px; font-weight: 600; line-height: 1.4; color: var(--text); }
  .room-date { font-size: 11px; color: var(--muted); margin-top: 4px; }
  .room-footer { display: flex; justify-content: space-between; align-items: center; margin-top: 12px; }
  .stars { color: var(--warn); letter-spacing: 2px; font-size: 14px; }
  .mastery { font-size: 11px; color: var(--accent); }
  .lock-icon { color: var(--muted); }

  /* ROOM (in-game) */
  .question-screen { padding: 0; }
  .question-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 20px;
    padding-bottom: 14px;
    border-bottom: 1px solid var(--locked);
  }
  .breadcrumb { color: var(--muted); font-size: 12px; letter-spacing: 2px; }
  .breadcrumb .accent { color: var(--accent); }
  .q-progress { color: var(--accent2); font-size: 13px; }

  .question-card {
    background: var(--card);
    border: 1px solid var(--accent2);
    padding: 28px;
    margin-bottom: 20px;
    box-shadow: 0 0 30px rgba(0,217,255,0.1);
  }
  .q-type-badge {
    display: inline-block;
    background: var(--bg2);
    color: var(--accent2);
    padding: 4px 10px;
    font-size: 10px;
    letter-spacing: 2px;
    margin-bottom: 16px;
    border: 1px solid var(--accent2);
  }
  .q-prompt {
    font-family: ui-sans-serif, system-ui, sans-serif;
    font-size: 18px;
    line-height: 1.6;
    margin-bottom: 24px;
    color: var(--text);
  }
  .q-prompt code, .q-prompt .eq {
    font-family: ui-monospace, monospace;
    background: var(--bg2);
    padding: 1px 6px;
    color: var(--accent);
    border-radius: 3px;
  }

  /* MCQ options */
  .options { display: flex; flex-direction: column; gap: 10px; }
  .option {
    background: var(--bg2);
    border: 1px solid var(--locked);
    padding: 14px 18px;
    cursor: pointer;
    transition: all 0.15s;
    font-family: ui-sans-serif, system-ui, sans-serif;
    font-size: 15px;
    color: var(--text);
    text-align: left;
    display: flex;
    align-items: center;
    gap: 12px;
  }
  .option:hover { border-color: var(--accent2); background: var(--card2); }
  .option.selected { border-color: var(--accent); background: rgba(0,255,159,0.08); }
  .option.correct { border-color: var(--accent); background: rgba(0,255,159,0.18); box-shadow: 0 0 16px rgba(0,255,159,0.3); }
  .option.wrong { border-color: var(--danger); background: rgba(255,56,96,0.15); animation: glitch 0.3s; }
  .option-letter {
    display: inline-block;
    width: 28px; height: 28px;
    border: 1px solid var(--muted);
    text-align: center;
    line-height: 26px;
    font-weight: bold;
    color: var(--muted);
    flex-shrink: 0;
  }
  .option.selected .option-letter, .option.correct .option-letter { border-color: var(--accent); color: var(--accent); }
  .option.wrong .option-letter { border-color: var(--danger); color: var(--danger); }

  /* Numeric input */
  .numeric-wrap { display: flex; gap: 12px; align-items: center; }
  .numeric-input {
    background: var(--bg2);
    border: 1px solid var(--accent2);
    color: var(--accent);
    padding: 14px 18px;
    font-family: inherit;
    font-size: 24px;
    width: 200px;
    text-align: center;
    letter-spacing: 1px;
  }
  .numeric-input:focus { outline: none; border-color: var(--accent); box-shadow: 0 0 12px var(--accent); }
  .numeric-units { color: var(--muted); font-size: 14px; }

  /* Match */
  .match-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
  }
  .match-col-label {
    color: var(--accent2);
    font-size: 11px;
    letter-spacing: 2px;
    margin-bottom: 6px;
  }
  .match-item {
    background: var(--bg2);
    border: 1px solid var(--locked);
    padding: 12px;
    cursor: pointer;
    margin-bottom: 8px;
    transition: all 0.15s;
    font-family: ui-sans-serif, system-ui, sans-serif;
    font-size: 14px;
  }
  .match-item:hover { border-color: var(--accent2); }
  .match-item.selected { border-color: var(--accent); background: rgba(0,255,159,0.1); }
  .match-item.paired { opacity: 0.5; cursor: default; border-color: var(--accent); background: rgba(0,255,159,0.05); }
  .match-pair-tag { display: inline-block; color: var(--accent); margin-right: 6px; font-weight: bold; }

  /* Feedback */
  .feedback {
    margin-top: 20px;
    padding: 16px;
    border-left: 3px solid;
    background: var(--bg2);
    font-family: ui-sans-serif, system-ui, sans-serif;
    font-size: 14px;
    line-height: 1.6;
  }
  .feedback.correct { border-color: var(--accent); }
  .feedback.wrong { border-color: var(--danger); }
  .feedback-title { font-weight: bold; margin-bottom: 6px; font-family: inherit; letter-spacing: 2px; }
  .feedback.correct .feedback-title { color: var(--accent); }
  .feedback.wrong .feedback-title { color: var(--danger); }
  .feedback-explain { color: var(--muted); }

  .q-actions { margin-top: 20px; display: flex; justify-content: flex-end; gap: 10px; }

  /* Results */
  .result-screen { text-align: center; padding: 40px 0; }
  .result-headline { font-size: 32px; color: var(--accent); letter-spacing: 4px; margin-bottom: 12px; }
  .result-headline.fail { color: var(--danger); }
  .result-room { color: var(--muted); margin-bottom: 32px; }
  .result-stats {
    display: flex;
    justify-content: center;
    gap: 40px;
    margin-bottom: 40px;
  }
  .result-stat { }
  .result-stat-value { font-size: 36px; color: var(--accent); font-weight: bold; }
  .result-stat-label { font-size: 11px; color: var(--muted); letter-spacing: 2px; margin-top: 4px; }
  .result-stars { font-size: 48px; color: var(--warn); letter-spacing: 8px; margin: 20px 0; }

  /* Boss screen accent */
  .boss-mode .question-card { border-color: var(--danger); box-shadow: 0 0 24px rgba(255,56,96,0.2); }
  .boss-mode .q-type-badge { border-color: var(--danger); color: var(--danger); }
  .boss-timer { color: var(--danger); font-size: 24px; font-weight: bold; letter-spacing: 2px; }
  .boss-timer.critical { animation: flicker 0.4s infinite; }

  /* Misc */
  .center { text-align: center; }
  .mt-lg { margin-top: 32px; }
  .ascii { font-family: monospace; white-space: pre; line-height: 1.1; color: var(--accent); opacity: 0.5; font-size: 11px; }
</style>
</head>
<body>
<div id="app"></div>

<script>
// ============================================================
// QUESTION BANK — DCoCP (Dynamics and Control of Chemical Processes)
// Course: Prof. Matteo Pelucchi, Politecnico di Milano, AY 2025/26
// Based on Stephanopoulos "Chemical Process Control" + course calendar
// ============================================================

const ROOMS = [
  {
    id: 'L1', date: 'WK1', name: 'Products & Productions', questions: [
      { type: 'mcq', prompt: 'Zennaro distinguishes four branches of the chemical industry by raw-material origin. BIOREFINERY uses:',
        options: ['Oil only', 'Biomasses (palm oil, RUCO — Repurposed Used Cooking Oil, castor oil…)', 'Coal exclusively', 'Synthetic feedstocks only'],
        correct: 1, explain: 'Slide L1 p.1: biorefinery = biomass-based production lines. Petrochemical = oil/gas/coal. Refinery = oil. Inorganic = minerals/air/water (ammonia, H2SO4, etc.).' },
      { type: 'mcq', prompt: 'Which product is classified as a "PSEUDOCOMMODITY" in Zennaro\'s categorization?',
        options: ['Methanol', 'Plastic materials and fibers', 'Pharmaceutical intermediates', 'Sulfuric acid'],
        correct: 1, explain: 'Slide L1 p.2: commodities = basic inorganic/organic chemistry products + technical gases. Pseudocommodities = plastic materials, fibers. Fine chemicals = pharma intermediates, pigments. Specialties = catalysts, varnishes, formulated products.' },
      { type: 'match', prompt: 'Match each historical process replacement to its decade (Zennaro\'s examples of process development).',
        pairs: [
          { left: 'Carbonylation of methanol replaces acetaldehyde oxidation for acetic acid', right: '1960s' },
          { left: 'Balanced process from ethylene replaces acetylene route for VCM', right: '1970s' },
          { left: 'Maleic anhydride from n-butane (fluidized bed) replaces benzene oxidation (fixed bed)', right: '1980s' },
          { left: 'L.H. Baekeland patents the first synthetic polymer (phenolic resin)', right: '1907' }
        ], explain: 'Slide L1 p.2 highlights these three sequential process-development shifts. Each replaced a less-economical or more-hazardous route with a better one — illustrating "process development" as the dominant innovation mode for commodities.' },
      { type: 'mcq', prompt: 'According to Zennaro, the major European chemical companies (3 in world top 10) are:',
        options: ['BASF, Bayer, Henkel', 'BASF, INEOS, LyondellBasell', 'Solvay, Arkema, Evonik', 'Shell, BP, ENI'],
        correct: 1, explain: 'Slide L1 p.13: Europe has lost leadership — only 3 in the global top 10. In the 90s EniChem (ENI group) was top 10 but no longer.' },
      { type: 'error', prompt: 'Three of these are TRUE per Zennaro\'s L1, one is FALSE.',
        statements: [
          'Specialty chemicals have a SHORT life cycle and are driven by market demand',
          'Base chemicals (commodities) have a LONG life cycle and focus on process development',
          'MTBE moved from "fine chemical" to "commodity" — categories are not fixed',
          'Pharmaceuticals are typically classified as commodities'
        ], wrongIndex: 3, explain: 'Slide L1 p.2: pharmaceutical intermediates = FINE chemicals, not commodities. The hierarchy by volume: commodity > pseudocommodity > specialty > fine.' }
    ]
  },
  {
    id: 'L2', date: 'WK2', name: 'Raw Materials & Energy Sources', questions: [
      { type: 'mcq', prompt: 'NGL, LPG, and LNG are defined as:',
        options: ['Three names for the same thing', 'NGL = ethane/propane/butanes/pentanes/natural gasoline; LPG = propane+butanes; LNG = liquefied methane', 'All are crude-oil fractions', 'They differ only in transport temperature'],
        correct: 1, explain: 'Slide L2 p.11: NGL = Natural Gas Liquid (the heavier C2+ fraction of natural gas). LPG = the C3+C4 subset. LNG = methane liquefied for transport at −162°C.' },
      { type: 'mcq', prompt: 'In natural-gas treatment, "SWEETENING" removes:',
        options: ['Water', 'H2S (and CO2)', 'Heavy hydrocarbons', 'Mercury'],
        correct: 1, explain: 'Slide L2 p.18: sweetening = chemical absorption in ethanolamines or K2CO3 (low H2S) or physical absorption in high-boiling organic solvents (high H2S). Dehydration is a separate step.' },
      { type: 'mcq', prompt: 'METHANE HYDRATES are noteworthy because:',
        options: ['They are a refinery by-product', '1 m³ of hydrate releases ~164 m³ of natural gas; reserves may exceed all oil+gas+coal combined', 'They are easy to extract', 'They contain no H2O'],
        correct: 1, explain: 'Slide L2 p.15: methane trapped in ice clathrates ("burning ice"). Found under Arctic permafrost and ocean floor. Industrially not yet exploited but reserves are vast.' },
      { type: 'numeric', prompt: 'In coal gasification, the reaction C + H2O → CO + H2 has ΔH = ? kcal/mol (Zennaro slide L2)',
        answer: 28, tolerance: 1, units: 'kcal/mol',
        explain: 'Slide L2 p.23: ΔH = +28 kcal/mol (endothermic). Other gasification reactions: 2C+O2→2CO (−60), C+CO2⇌2CO (+38), CO+H2O⇌H2+CO2 (−10, WGS).' },
      { type: 'match', prompt: 'Match each lignocellulose component to its characterization (per Zennaro L2).',
        pairs: [
          { left: 'Cellulose (35–50%)', right: 'Linear, crystalline, dimer of glucose (cellobiose)' },
          { left: 'Hemicellulose (15–25%)', right: 'Branched, amorphous, mixed C5/C6 sugars (xylose dominant)' },
          { left: 'Lignin (15–30%)', right: 'Amorphous 3D aromatic polymer — chemically resistant' },
          { left: 'HVO (2-stage)', right: 'Stage 1 at 70 bar (deoxygenation); Stage 2 at 50 bar (isomerization)' }
        ], explain: 'Slides L2 p.29–33 and HVO process p.28. These compositions and conditions are exam-grade specifics.' }
    ]
  },
  {
    id: 'L3', date: 'WK3', name: 'Process Schemes & Symbology', questions: [
      { type: 'mcq', prompt: 'In increasing level of detail, Zennaro orders process diagrams as:',
        options: ['P&ID → PFD → Block diagram', 'Block diagram → Process Flow Diagram (PFD) → P&I Diagram', 'PFD → Block → P&ID', 'They are interchangeable'],
        correct: 1, explain: 'Slide L3 p.3–4: BFD is the simplest (boxes), PFD shows equipment + streams + main T/P/flow, P&ID adds every line, valve, instrument, tag, and control loop.' },
      { type: 'mcq', prompt: 'In Zennaro\'s example, the production scheme of methanol from natural gas is shown at three levels (block, PFD, P&ID). The methanol PFD includes which key reactor unit?',
        options: ['A fluidized bed cracker', 'Steam reformer + methanol synthesis converter', 'Visbreaking unit', 'Catalytic reforming unit'],
        correct: 1, explain: 'Slide L3 p.3: methanol PFD = NG sweetening → steam reformer (Ni/ceramic) → methanol converter (Cu/ZnO/Al2O3) → crude MeOH purification.' },
      { type: 'mcq', prompt: 'A "block diagram" is best used to:',
        options: ['Specify every instrument tag for construction', 'Communicate the overall process logic and major streams without equipment detail', 'Calculate detailed heat exchanger areas', 'Design control loops'],
        correct: 1, explain: 'BFD = highest-level view. Used in concept/feasibility stage. PFD adds engineering content for sizing; P&ID is the construction-and-operations document.' },
      { type: 'mcq', prompt: 'In a P&ID, which of the following would you EXPECT to see?',
        options: ['Mass-balance numbers only', 'Every isolation valve, control valve, instrument tag, and piping spec', 'Block-level chemistry only', 'Only major equipment'],
        correct: 1, explain: 'P&ID = the operating bible. Includes piping classes, valve types, instrument tags (TIC, FIC, LIC, etc.), interlock symbols, vents/drains. Used during commissioning and HAZOP.' },
      { type: 'mcq', prompt: 'The PFD shown in the methanol example primarily communicates:',
        options: ['Pipe routing in the plot plan', 'Equipment, main streams, key T/P/composition, and the recycle structure', 'Detailed control logic only', 'Vendor part numbers'],
        correct: 1, explain: 'PFD strikes a balance: enough engineering detail to do mass/energy balances and equipment sizing, without the line-by-line clutter of a P&ID.' }
    ]
  },
  {
    id: 'L4', date: 'WK4', name: 'Catalysis & Catalysts', questions: [
      { type: 'mcq', prompt: 'Zennaro\'s working definition of a catalyst is:',
        options: ['A substance consumed in the reaction', 'A substance that ENHANCES THE RATE of approach to chemical equilibrium, remains unchanged at the end of the catalytic cycle, and offers an energetically favorable alternative mechanism', 'A substance that shifts the equilibrium constant', 'A reagent regenerated stoichiometrically'],
        correct: 1, explain: 'Slide L4 p.1. Note: a catalyst CANNOT shift equilibrium (Keq is a state function); it only accelerates the approach. Bullet #3 also rules out being permanently consumed.' },
      { type: 'mcq', prompt: 'Comparing HOMOGENEOUS vs HETEROGENEOUS catalysis (per Zennaro\'s table):',
        options: ['Homogeneous advantage: easy catalyst/products separation', 'Homogeneous advantage: fast transport, uniformly accessible catalyst, good selectivity; disadvantage: difficult separation, corrosive, limited to low T', 'Heterogeneous catalysts always selectivity-superior', 'Both are essentially equivalent at scale'],
        correct: 1, explain: 'Slide L4 p.2 directly tabulates this. Het advantages: easy separation, non-corrosive, high T. Het disadvantages: surface-only access, surface poisoning, selectivity problems.' },
      { type: 'mcq', prompt: 'ZEOLITES are made by repetition of which tetrahedra?',
        options: ['SiO2 only', 'SiO2 and AlO2− tetrahedra, with cations (H+, Me+) balancing the charge', 'Al2O3 only', 'TiO2'],
        correct: 1, explain: 'Slide L4 zeolites section. The framework Si:Al ratio + counter-cation determines acidity. Bridging O-H bonds give Brønsted acidity; cations like Na+, K+ moderate it.' },
      { type: 'mcq', prompt: 'Zeolites of practical industrial interest have pore openings formed by:',
        options: ['4 oxygen ions (2.6 Å)', '8–12 oxygen ions (~4–7.4 Å)', '20+ oxygen ions', 'No pores'],
        correct: 1, explain: 'Slide L4: pores from 4-, 6-, 8-, 10-, 12-O rings (2.6–7.4 Å). Only 8–12 O openings have industrial interest (correct size to admit and shape-select common hydrocarbons).' },
      { type: 'match', prompt: 'Match each deactivation mode to its mechanism (Zennaro L4).',
        pairs: [
          { left: 'Poisoning', right: 'Strong adsorption of impurity on active sites (e.g., S on Cu)' },
          { left: 'Coking (fouling)', right: 'Physical deposition of carbonaceous species on the surface' },
          { left: 'Sintering', right: 'Crystallite growth → loss of surface area, high-T solid-state' },
          { left: 'Masking', right: 'Physical coverage by non-volatile substances (Ni/V in HDS, Si/P on catalytic converters)' }
        ], explain: 'Slide L4 deactivation section. Coking can be regenerated (air/steam/H2 burn). Sintering and severe poisoning are usually irreversible.' }
    ]
  },

const SAVE_KEY = 'organic_chem_challenge_v1';
let state = loadState();

function defaultState() {
  return {
    screen: 'title',
    lives: 3,
    score: 0,
    streak: 0,
    bestStreak: 0,
    totalXp: 0,
    currentRoomId: null,
    currentQIdx: 0,
    currentAnswer: null,
    answered: false,
    lastCorrect: null,
    roomResults: [],  // per-question correct/wrong for current room
    progress: {},     // { L1: { stars: 3, mastery: 100, completed: true }, ... }
    bossUnlocked: false,
    bossDone: false,
    bossTimer: null,
    bossStartTime: null,
  };
}

function loadState() {
  try {
    const raw = localStorage.getItem(SAVE_KEY);
    if (!raw) return defaultState();
    const saved = JSON.parse(raw);
    return { ...defaultState(), ...saved, screen: 'title' };  // always return to title on reload
  } catch (e) {
    return defaultState();
  }
}

function save() {
  try {
    const persist = {
      lives: state.lives, score: state.score, bestStreak: state.bestStreak,
      totalXp: state.totalXp, progress: state.progress,
      bossUnlocked: state.bossUnlocked, bossDone: state.bossDone,
    };
    localStorage.setItem(SAVE_KEY, JSON.stringify(persist));
  } catch (e) {}
}

function resetAll() {
  if (!confirm('Wipe all progress and start over? This cannot be undone.')) return;
  localStorage.removeItem(SAVE_KEY);
  state = defaultState();
  render();
}

let audioCtx = null;
function beep(freq, dur, type = 'square', vol = 0.04) {
  try {
    if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    const o = audioCtx.createOscillator();
    const g = audioCtx.createGain();
    o.type = type;
    o.frequency.value = freq;
    g.gain.value = vol;
    o.connect(g); g.connect(audioCtx.destination);
    o.start();
    g.gain.exponentialRampToValueAtTime(0.0001, audioCtx.currentTime + dur);
    o.stop(audioCtx.currentTime + dur);
  } catch (e) {}
}
const sfx = {
  click: () => beep(800, 0.05),
  correct: () => { beep(660, 0.1); setTimeout(() => beep(990, 0.15), 80); },
  wrong: () => { beep(180, 0.2, 'sawtooth', 0.06); },
  unlock: () => { beep(440, 0.08); setTimeout(() => beep(660, 0.08), 70); setTimeout(() => beep(880, 0.15), 140); },
  boss: () => { beep(110, 0.4, 'sawtooth', 0.08); }
};

function renderQuestionBody(q) {
  const locked = state.answered ? 'style="pointer-events: none;"' : '';
  if (q.type === 'mcq' || q.type === 'error') {
    const options = q.type === 'mcq' ? q.options : q.statements;
    return `<div class="options" ${locked}>` + options.map((opt, i) => {
      let cls = '';
      if (state.currentAnswer === i) cls = 'selected';
      if (state.answered) {
        const correctIdx = q.type === 'mcq' ? q.correct : q.wrongIndex;
        if (i === correctIdx) cls = 'correct';
        else if (i === state.currentAnswer) cls = 'wrong';
      }
      const letter = String.fromCharCode(65 + i);
      return `<div class="option ${cls}" onclick="pickOption(${i})"><span class="option-letter">${letter}</span><span>${opt}</span></div>`;
    }).join('') + '</div>';
  }
  if (q.type === 'numeric') {
    return `
      <div class="numeric-wrap">
        <input type="number" class="numeric-input" id="numInput" step="any"
               value="${state.currentAnswer ?? ''}"
               oninput="state.currentAnswer = this.value === '' ? null : parseFloat(this.value); document.getElementById('submitBtn').disabled = state.currentAnswer === null;"
               onkeydown="if(event.key==='Enter' && !state.answered && state.currentAnswer !== null) submitAnswer();"
               ${state.answered ? 'disabled' : 'autofocus'}>
        <span class="numeric-units">${q.units || ''}</span>
      </div>
    `;
  }
  if (q.type === 'match') {
    // currentAnswer holds: { pairs: { leftIdx: rightIdx }, picking: leftIdx | null }
    if (!state.currentAnswer || typeof state.currentAnswer !== 'object') {
      state.currentAnswer = { pairs: {}, picking: null };
    }
    const ans = state.currentAnswer;
    const rightShuffled = q._shuffledRight || (q._shuffledRight = shuffle(q.pairs.map((p, i) => ({ text: p.right, originalIdx: i }))));
    let html = '<div class="match-grid">';
    // Left column
    html += '<div><div class="match-col-label">TERMS</div>';
    q.pairs.forEach((p, i) => {
      const paired = ans.pairs[i] !== undefined;
      const selected = ans.picking === i;
      const pairTag = paired ? `<span class="match-pair-tag">[${getPairLetter(ans.pairs[i], rightShuffled)}]</span>` : '';
      let revealCls = '';
      if (state.answered) {
        revealCls = ans.pairs[i] === i ? 'correct' : 'wrong';
        revealCls = revealCls === 'correct' ? 'paired' : 'wrong';
      }
      html += `<div class="match-item ${paired ? 'paired' : ''} ${selected ? 'selected' : ''} ${state.answered ? revealCls : ''}"
                onclick="pickMatchLeft(${i})">${pairTag}${p.left}</div>`;
    });
    html += '</div>';
    // Right column (shuffled)
    html += '<div><div class="match-col-label">DEFINITIONS</div>';
    rightShuffled.forEach((r, displayIdx) => {
      const usedBy = Object.entries(ans.pairs).find(([l, rOrig]) => rOrig === r.originalIdx);
      const paired = !!usedBy;
      const letter = String.fromCharCode(65 + displayIdx);
      html += `<div class="match-item ${paired ? 'paired' : ''}" onclick="pickMatchRight(${r.originalIdx})">
                 <span class="match-pair-tag">[${letter}]</span>${r.text}
               </div>`;
    });
    html += '</div></div>';
    return html;
  }
  return '<div>Unsupported question type.</div>';
}

function getPairLetter(originalRightIdx, shuffledRight) {
  const idx = shuffledRight.findIndex(r => r.originalIdx === originalRightIdx);
  return String.fromCharCode(65 + idx);
}

function renderFeedback(q) {
  const correct = state.lastCorrect;

// ============================================================
// EVENT HANDLERS
// ============================================================
function goMap() {
  sfx.click();
  state.screen = 'map';
  state.currentRoomId = null;
  state.currentQIdx = 0;
  state.currentAnswer = null;
  state.answered = false;
  state.roomResults = [];
  state.lives = 3;  // refill lives between rooms
  render();
}

function startRoom(id) {
  sfx.click();
  state.screen = 'room';
  state.currentRoomId = id;
  state.currentQIdx = 0;
  state.currentAnswer = null;
  state.answered = false;
  state.roomResults = [];
  state.lives = 3;
  state.streak = 0;
  // shuffle each room's MCQ option order? No — keep stable for muscle memory.
  // Reset any shuffled match arrays so they re-shuffle on retry:
  ROOMS.find(r => r.id === id).questions.forEach(q => { if (q.type === 'match') delete q._shuffledRight; });
  render();
}

function pickOption(i) {
  if (state.answered) return;
  sfx.click();
  state.currentAnswer = i;
  render();
}

function pickMatchLeft(leftIdx) {
  if (state.answered) return;
  const ans = state.currentAnswer;
  if (ans.pairs[leftIdx] !== undefined) {
    // already paired — unpair
    delete ans.pairs[leftIdx];
    ans.picking = null;
  } else {
    ans.picking = leftIdx;
  }
  sfx.click();
  render();
  maybeFinalizeMatch();
}

function pickMatchRight(rightIdx) {
  if (state.answered) return;
  const ans = state.currentAnswer;
  // if this right is already paired, do nothing
  if (Object.values(ans.pairs).includes(rightIdx)) return;
  if (ans.picking === null) return;
  ans.pairs[ans.picking] = rightIdx;
  ans.picking = null;
  sfx.click();
  render();
  maybeFinalizeMatch();
}

function maybeFinalizeMatch() {
  const q = ROOMS.find(r => r.id === state.currentRoomId)?.questions[state.currentQIdx]
            || BOSS_POOL?.[state.currentQIdx];
  if (!q || q.type !== 'match') return;
  const ans = state.currentAnswer;
  const pairCount = Object.keys(ans.pairs).length;
  document.getElementById('submitBtn').disabled = pairCount !== q.pairs.length;
}

function submitAnswer() {
  const room = state.bossActive
    ? { questions: BOSS_POOL, id: 'BOSS' }
    : ROOMS.find(r => r.id === state.currentRoomId);
  const q = room.questions[state.currentQIdx];
  let correct = false;
  if (q.type === 'mcq') correct = state.currentAnswer === q.correct;
  else if (q.type === 'error') correct = state.currentAnswer === q.wrongIndex;
  else if (q.type === 'numeric') {
    const ans = parseFloat(state.currentAnswer);
    correct = !isNaN(ans) && Math.abs(ans - q.answer) <= (q.tolerance ?? 0.01);
  } else if (q.type === 'match') {
    correct = q.pairs.every((_, i) => state.currentAnswer.pairs[i] === i);
  }

  state.answered = true;
  state.lastCorrect = correct;
  state.roomResults.push(correct);

  if (correct) {
    state.streak++;
    if (state.streak > state.bestStreak) state.bestStreak = state.streak;
    const mult = Math.min(5, 1 + Math.floor(state.streak / 3));
    const gain = (state.bossActive ? 100 : 50) * mult;
    state.totalXp += gain;
    sfx.correct();
  } else {
    state.streak = 0;
    state.lives--;
    sfx.wrong();
  }
  save();
  render();

  // If out of lives mid-room, end the room
  if (state.lives <= 0 && !state.bossActive) {
    setTimeout(() => endRoom(), 1400);
  } else if (state.lives <= 0 && state.bossActive) {
    setTimeout(() => endBoss(), 1400);
  }
}

function nextQuestion() {
  const room = state.bossActive ? { questions: BOSS_POOL } : ROOMS.find(r => r.id === state.currentRoomId);
  state.currentQIdx++;
  state.currentAnswer = null;
  state.answered = false;
  if (state.currentQIdx >= room.questions.length) {
    if (state.bossActive) endBoss();
    else endRoom();
    return;
  }
  // Reset match answer if next is match
  const nextQ = room.questions[state.currentQIdx];
  if (nextQ.type === 'match') state.currentAnswer = { pairs: {}, picking: null };
  render();
}

function endRoom() {
  state.screen = 'result';
  render();
}

function abandonRoom() {
  if (!confirm('Leave this room? Progress within the room is lost.')) return;
  goMap();
}

// ============================================================
// BOSS
// ============================================================
let BOSS_POOL = [];
function startBoss() {
  sfx.click();
  state.screen = 'boss-intro';
  render();
}

function actuallyStartBoss() {
  sfx.boss();
  // Build pool: 10 random from rooms + 5 exclusive
  const allRoomQs = ROOMS.flatMap(r => r.questions);
  BOSS_POOL = [...shuffle(allRoomQs).slice(0, 10), ...BOSS_EXCLUSIVE].sort(() => Math.random() - 0.5);
  // Clear any prior match shuffles
  BOSS_POOL.forEach(q => { if (q.type === 'match') delete q._shuffledRight; });
  state.bossActive = true;
  state.screen = 'room';
  state.currentRoomId = '★ BOSS ROUND ★';
  state.currentQIdx = 0;
  state.currentAnswer = BOSS_POOL[0].type === 'match' ? { pairs: {}, picking: null } : null;
  state.answered = false;
  state.roomResults = [];
  state.lives = 3;
  state.streak = 0;
  // Patch the room lookup: render uses currentRoomId, so we wrap
  render();
}

function endBoss() {
  state.bossActive = false;
  state.screen = 'boss-result';
  render();
}

// Patch render() for boss: when bossActive, treat currentRoom as BOSS_POOL
const originalRenderRoom = renderRoom;
renderRoom = function() {
  if (!state.bossActive) return originalRenderRoom();
  const q = BOSS_POOL[state.currentQIdx];
  if (!q) { state.screen = 'boss-result'; render(); return; }
  let html = renderHUD();
  html += `
    <div class="question-header">
      <div class="breadcrumb">// <span class="accent" style="color: var(--danger);">★ BOSS ROUND</span> · EXAM SIMULATION</div>
      <div class="q-progress">Q ${state.currentQIdx + 1} / ${BOSS_POOL.length}</div>
    </div>
    <div class="question-card boss-mode">
      <div class="q-type-badge" style="border-color: var(--danger); color: var(--danger);">${q.type.toUpperCase()}</div>
      <div class="q-prompt">${q.prompt}</div>
      ${renderQuestionBody(q)}
      ${state.answered ? renderFeedback(q) : ''}
      <div class="q-actions">
        ${state.answered
          ? `<button class="btn danger" onclick="nextQuestion()">${state.currentQIdx + 1 >= BOSS_POOL.length ? 'FINALIZE' : 'NEXT →'}</button>`
          : `<button class="btn danger" id="submitBtn" onclick="submitAnswer()" ${state.currentAnswer === null || (typeof state.currentAnswer === 'object' && Object.keys(state.currentAnswer.pairs || {}).length !== (q.pairs?.length || 0)) ? 'disabled' : ''}>SUBMIT</button>`}
        <button class="btn secondary" onclick="abandonBoss()">ABANDON</button>
      </div>
    </div>
  `;
  app.innerHTML = html;
};

function abandonBoss() {
  if (!confirm('Abandon the boss round? You will need to clear all rooms again to retry.')) return;
  state.bossActive = false;
  goMap();
}

// ============================================================
// UTIL
// ============================================================
function shuffle(arr) {
  const a = arr.slice();
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

// ============================================================
// BOOT
// ============================================================
render();
</script>
</body>
</html>
